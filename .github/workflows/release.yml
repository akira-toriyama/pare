name: release

# Tag-driven release: pushing a vX.Y.Z tag runs git-cliff + GoReleaser (binaries,
# checksums, Homebrew cask, build-provenance attestation). Deliberately NOT on
# every main push.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Least privilege, per job. The release job needs contents:write to publish and
# id-token/attestations to sign build provenance (F10).
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: generate release notes (git-cliff)
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: ${{ runner.temp }}/CHANGELOG.md

      # Skip the Homebrew cask push when the tap token is not configured, so a
      # release still succeeds (binaries + checksums + attestation) and the cask
      # can be published out of band. With the token set, the cask is pushed too.
      - id: args
        env:
          TAP: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          base="release --clean --release-notes ${{ runner.temp }}/CHANGELOG.md"
          if [ -z "$TAP" ]; then base="$base --skip=homebrew"; fi
          echo "value=$base" >> "$GITHUB_OUTPUT"

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          version: '~> v2' # pin the major series (not 'latest') (F7)
          args: ${{ steps.args.outputs.value }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fine-grained PAT with Contents:R/W on akira-toriyama/homebrew-tap.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: attest build provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: |
            dist/*.tar.gz
            dist/checksums.txt
