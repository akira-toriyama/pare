name: build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the repo (F6 — never run on the default
# repo-write token).
permissions:
  contents: read

jobs:
  # Shared Go CI core (build / vet / race-test / module-hygiene / golangci-lint v2),
  # SHA-pinned once in the hub. go.mod is floor-only (no `toolchain` line), so
  # gotoolchain: local installs the floor and stops a mid-run download (F1). coverage
  # keeps pare's informational func summary.
  ci:
    uses: akira-toriyama/.github/.github/workflows/go-ci.yml@v1
    with:
      go-version-file: go.mod
      gotoolchain: local
      coverage: true

  # Repo-specific checks. Docs guard and fuzz are OS-independent (Linux leg only);
  # the smoke runs on every leg so the shipped binary (macOS brew cask) is exercised
  # on darwin too (F8) — matching the pre-migration matrix, which the core test job
  # (build + unit tests) doesn't cover.
  extras:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Build/test-only, never pushes — drop the persisted checkout token
          # (zizmor artipacked). t-yaxa
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      # README hygiene guard: version-agnostic + EN/JA cross-link (F11).
      - name: docs guard
        if: runner.os == 'Linux'
        run: sh scripts/check-docs.sh

      # Short fuzz of the pure core — a cheap regression net for the budget
      # algorithm's invariants (identity-when-fits, line-subset).
      - name: fuzz budget core (30s)
        if: runner.os == 'Linux'
        run: go test -run '^$' -fuzz '^FuzzPare$' -fuzztime 30s ./internal/budget/

      - name: smoke test
        shell: bash
        run: |
          go build -o /tmp/pare ./cmd/pare
          /tmp/pare version
          # small output passes through untouched
          printf 'a\nb\nc\n' | /tmp/pare | grep -qx b
          # a buried error survives a small budget that a blind tail would drop
          { seq 1 200; echo "ERROR: boom"; seq 201 400; } \
            | /tmp/pare --budget-bytes 300 --head 3 --tail 3 | grep -q 'ERROR: boom'
